# Chasqui NGINX Container - Local Development
# =============================================================================
# Builds image from local Dockerfile for development/testing
# =============================================================================

services:
  chasqui-nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chasqui-nginx
    environment:
      - DOCKER_RUNTIME=true
    env_file:
      - .env.default
      - .env
    ports:
      - "${NGINX_PORT:-8080}:${NGINX_PORT:-8080}"
    volumes:
      # Frontend build output (Docker named volume, read-only)
      - chasqui_dist:/dist:ro
      # Content directories mounted separately (used via alias directive)
      - ${CONTENT_DIR:-../server/content}:/usr/share/nginx/content:ro
    networks:
      - chasqui_network
    restart: unless-stopped
    # Health check (also defined in Dockerfile, repeated here for clarity)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NGINX_PORT:-8080}/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  chasqui_network:
    external: true

volumes:
  chasqui_dist:
    name: chasqui_dist
    external: true
