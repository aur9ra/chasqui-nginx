# Security Headers Configuration
# =============================================================================
# This file is included in all server and location blocks to ensure consistent
# security headers across all responses, including error pages.
#
# IMPORTANT: Nginx's add_header directive does NOT inherit from parent contexts
# when a location block defines its own add_header. Each location that needs
# security headers must explicitly include this file.
# =============================================================================

# Prevent clickjacking by restricting frame embedding
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing that could lead to XSS
add_header X-Content-Type-Options "nosniff" always;

# Control referrer information leaked to third parties
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict access to browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera()" always;

# Request ID for tracing (uses variable defined in nginx.conf)
add_header X-Request-ID $req_id always;

# Content Security Policy - Restrictive static policy
# 'unsafe-inline' for styles is required by Astro's scoped CSS
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
